services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env
    # volumes:
    #   - ./:/app
    #   - /app/node_modules
    working_dir: /app
    depends_on:
      - redis
    command: npx nodemon --watch src --exec "ts-node src/server.ts"

  redis:
    image: redis:8.0.2
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
